version: "3"

vars:
  COVEROUT: cover.out
  GOBIN: $(go env GOPATH)/bin

tasks:
  default:
    deps: [dev]

  coverage:
    summary: Generate test coverage
    cmds:
      - task: test
        vars:
          CLI_ARGS: -coverprofile={{.COVEROUT}} -covermode=atomic -coverpkg=./...
    sources:
      - "**/*.go"
    generates:
      - "{{.COVEROUT}}"

  covercheck:
    summary: Check test coverage
    deps:
      - coverage
    cmds:
      - go tool github.com/vladopajic/go-test-coverage/v2 --config=./.testcoverage.yml

  dev:
    summary: Development mode
    cmd: go run . {{.CLI_ARGS}}

  build:
    summary: Build application
    cmd: go build -o dist/tmhi-cli .

  clean:
    summary: Clean the project
    cmds:
      - go clean
      - rm -f {{.COVEROUT}}

  fixlint:
    summary: Fix lint issues
    cmds:
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run --fix ./...

  fmt:
    summary: Format the code
    cmds:
      - go tool github.com/segmentio/golines -m 120 -w .
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run --fix ./...

  tidy:
    summary: Tidy the module
    cmds:
      - go mod tidy -v

  depup:
    summary: Upgrades dependencies
    cmds:
      - go get -u -t ./...
      - task tidy

  lint:
    summary: Lint code
    cmds:
      - go mod tidy -diff
      - go tool github.com/golangci/golangci-lint/v2/cmd/golangci-lint run ./...

  ci:
    summary: Run CI checks (lint, test, coverage)
    cmds:
      - task: lint
      - task: test
      - task: covercheck

  test:
    summary: Run tests
    cmd: go test ./... {{.CLI_ARGS}}
