version: "2"
linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - godox
    - nlreturn
    - noinlineerr
    - paralleltest
    - testpackage
    - varnamelen
    - wsl
    - wsl_v5
  settings:
    errcheck:
      check-blank: true
  exclusions:
    generated: lax
    paths:
      - _test\.go
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
