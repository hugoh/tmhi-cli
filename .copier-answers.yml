# Changes here will be overwritten by Copier; NEVER EDIT MANUALLY
_commit: v1.0.0
_src_path: gh:hugoh/go-tools
codecov_ignore:
- main.go
codecov_style: simple
cog_omit_types: []
coverage_total: 80
dev_watch: false
dprint_has_excludes: true
golangci_extra_disable:
- depguard
- exhaustruct
- testpackage
golangci_extra_exclusions: []
golangci_revive_overrides: false
golangci_test_exclude_linters:
- err113
- funlen
- varnamelen
goreleaser_before_hooks: []
goreleaser_version_pkg: main
has_fuzz: false
has_gen: false
has_goreleaser: true
has_homebrew_cask: false
has_test_int: true
hk_has_golangci_step: true
hk_has_goreleaser_step: false
hk_prepush_with_go_ci: false
nfpm_extra_contents: []
project_description: CLI for managing T-Mobile Home Internet gateway and signal monitoring
project_name: tmhi-cli
test_int_cmd: test ! -d internal || gotestsum -- -race -tags=integration ./internal/...
testcoverage_excludes:
- main\.go$
testcoverage_overrides: []
